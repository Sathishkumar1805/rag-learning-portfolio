server:
  port: 8083

spring:
  application:
    name: agentic-rag
  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GOOGLE_CLOUD_PROJECT_ID:my-project}
          location: us-central1
          chat:
            options:
              model: gemini-1.5-flash
        embedding:
          project-id: ${GOOGLE_CLOUD_PROJECT_ID:my-project}
          location: us-central1
          text:
            options:
              model: text-embedding-004

rag:
  agent:
    max-iterations: 5
    search-top-k: 5
  chunking:
    chunk-size: 500
    min-chunk-size: 100

logging:
  level:
    com.sathish.rag: DEBUG
    org.springframework.ai: INFO
